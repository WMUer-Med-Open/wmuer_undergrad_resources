name: Repository Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repository-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run repository checks
        run: python scripts/check_repository.py
